<!DOCTYPE html>
<html lang="fr">
<head>

      rel="stylesheet"/>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    {% if title %}

<body>

            <a class="nav-link active" href="{{ url_for('home') }}">Accueil</a>

<main>

</main>

<footer>
